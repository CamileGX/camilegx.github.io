<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="DexieOS — a personal AI command center.">
    <meta name="theme-color" content="#080b14">
    <title>DexieOS — Personal AI Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
  </head>
  <body>
    <div class="ambient ambient-one"></div><div class="ambient ambient-two"></div>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <a class="wordmark" href="#home" aria-label="DexieOS home"><span class="wordmark-mark">D</span><span>Dexie<span class="accent">OS</span></span></a>
        <nav class="side-nav" aria-label="Primary navigation">
          <a href="#home" data-page="home"><span class="nav-icon">⌂</span>Home</a>
          <a href="#projects" data-page="projects"><span class="nav-icon">◈</span>Projects</a>
          <a href="#assistants" data-page="assistants"><span class="nav-icon">✦</span>AI Assistants</a>
          <a href="#knowledge" data-page="knowledge"><span class="nav-icon">◫</span>Knowledge Base</a>
          <a href="#timeline" data-page="timeline"><span class="nav-icon">◌</span>Timeline</a>
          <a href="#notes" data-page="notes"><span class="nav-icon">▤</span>Notes</a>
        </nav>
        <div class="sidebar-bottom"><a href="#settings" data-page="settings"><span class="nav-icon">⚙</span>Settings</a><p class="system-id"><span></span> SYSTEM ONLINE</p></div>
      </aside>
      <main class="main-content">
        <header class="topbar"><button class="menu-button" id="menuButton" aria-label="Open navigation">☰</button><div class="breadcrumb"><span id="sectionName">Command Center</span><span class="top-status"><i></i> All systems nominal</span></div><div class="top-actions"><button class="icon-button" id="themeToggle" aria-label="Toggle display contrast">◐</button><button class="profile" aria-label="Open profile">DC</button></div></header>
        <div id="app" class="page-stage" aria-live="polite"></div>
      </main>
    </div>
    <template id="emptyState"><div class="empty-state"><span>◎</span><h2>Nothing here yet</h2><p>This space is ready when you are.</p></div></template>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
